apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-bind-backend
rules:
  # Full access to all resources (backend manages bindings across API groups)
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
  # Access to APIExport for backend operations
  - apiGroups: ["apis.kcp.io"]
    resources: ["apiexports"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apis.kcp.io"]
    resources: ["apiexports/content"]
    verbs: ["*"]
  - apiGroups: ["apis.kcp.io"]
    resources: ["apiexportendpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apis.kcp.io"]
    resources: ["apiresourceschemas"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apis.kcp.io"]
    resources: ["apibindings"]
    verbs: ["get", "list", "watch"]
