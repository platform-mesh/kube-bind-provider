replicaCount: 1

image:
  repository: ghcr.io/platform-mesh/kube-bind-provider-portal
  pullPolicy: IfNotPresent
  tag: "@sha256:08dbaf0ac7723eed4426c7c0b98212ad32693c2d747cd159a854bb4463cc7621"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 101

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: portal.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

httpRoute:
  enabled: false
  namespace: platform-mesh-system
  hostnames:
    - portal.localhost
    - "*.portal.localhost"
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: k8sapi-gateway
      namespace: platform-mesh-system
  pathPrefix: /kube-bind
  filters:
    - extensionRef:
        group: traefik.io
        kind: Middleware
        name: kube-bind-portal-cors
      type: ExtensionRef
  referenceGrant:
    enabled: true
    fromNamespace: platform-mesh-system

middleware:
  enabled: false
  namespace: platform-mesh-system
  corsOrigins:
    - http://localhost:4300
    - https://portal.localhost:8443
    - https://*.portal.localhost:8443

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}
