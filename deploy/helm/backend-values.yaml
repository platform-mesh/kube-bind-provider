# Values for deploying the upstream kube-bind backend chart
# with kube-bind-provider init container and PlatformMesh configuration.
#
# Usage:
#   helm install kube-bind-backend \
#     ../../kube-bind/kube-bind/deploy/charts/backend \
#     -f deploy/helm/backend-values.yaml \
#     -n kube-bind-system --create-namespace

backend:
  kubeconfig: "/etc/kube-bind/kubeconfig"
  externalAddress: "https://frontproxy-front-proxy.platform-mesh-system:6443"
  prettyName: "PlatformMesh.io"
  namespacePrefix: "kube-bind-"
  consumerScope: "cluster"
  clusterScopeIsolation: "none"
  multiclusterRuntimeProvider: "kcp"
  schemaSource: "apiresourceschemas"
  apiexportEndpointSliceName: "kube-bind.io"
  frontendDisabled: true
  apibindingIgnorePrefixes:
    - core.platform-mesh.io
    - tenancy.kcp.io
    - topology.kcp.io
    - kube-bind.io

image:
  repository: ghcr.io/mjudeikis/backend
  pullPolicy: Always
  tag: "v20260331"

# hostAliases to resolve kcp hostnames inside the cluster.
# The IP should be the ClusterIP of the frontproxy-front-proxy service.
# Get it with: kubectl get svc -n platform-mesh-system frontproxy-front-proxy -o jsonpath='{.spec.clusterIP}'
hostAliases:
  - ip: "10.96.188.4"
    hostnames:
      - "localhost"
      - "portal.localhost"
      - "kcp.localhost"
      - "root.kcp.localhost"

volumes:
  - name: kcp-kubeconfig
    secret:
      secretName: kube-bind-provider-kubeconfig

volumeMounts:
  - name: kcp-kubeconfig
    mountPath: /etc/kube-bind
    readOnly: true
